# Deploy poll-tracker-app to https://<user>.github.io/<repo>/
# Deploy media-bias-app  to https://<user>.github.io/<repo>/media-bias/
#
# FIRST-TIME SETUP (otherwise deploy job fails with 404 "Failed to create deployment"):
#   1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions" (not "Deploy from a branch").
#   2. Repo → Settings → Actions → General → Workflow permissions: enable "Read and write permissions".
#   3. Repo → Settings → Secrets and variables → Actions: add secret VITE_GOOGLE_SHEETS_API_KEY (required).
#      Optional secret VITE_GOOGLE_SHEETS_SPREADSHEET_ID if not using the project default sheet.
#
# upload-pages-artifact stays @v3 so .nojekyll from public/ is included (v4 omits dotfiles).

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            poll-tracker-app/package-lock.json
            media-bias-app/package-lock.json

      - name: Require VITE_GOOGLE_SHEETS_API_KEY secret
        env:
          KEY: ${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::Add repository secret VITE_GOOGLE_SHEETS_API_KEY under Settings → Secrets and variables → Actions. See poll-tracker-app/.env.example."
            exit 1
          fi

      # ── Build poll-tracker-app (served at /<repo>/) ──────────────────────
      - name: Install and build poll-tracker-app
        working-directory: poll-tracker-app
        run: |
          npm ci
          npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.VITE_GOOGLE_SHEETS_SPREADSHEET_ID }}
          VITE_GOOGLE_SHEETS_API_KEY: ${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}

      # ── Build media-bias-app (served at /<repo>/media-bias/) ─────────────
      - name: Install and build media-bias-app
        working-directory: media-bias-app
        run: |
          npm ci
          npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/media-bias/
          VITE_GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.VITE_GOOGLE_SHEETS_SPREADSHEET_ID }}
          VITE_GOOGLE_SHEETS_API_KEY: ${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}

      # ── Merge outputs into a single artifact ─────────────────────────────
      - name: Merge dist directories
        run: |
          mkdir -p poll-tracker-app/dist/media-bias
          cp -r media-bias-app/dist/. poll-tracker-app/dist/media-bias/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: poll-tracker-app/dist

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
