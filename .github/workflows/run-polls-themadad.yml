# Self-hosted runner: fetch themadad from YOUR network (avoids GitHub datacenter 403).
#
# Setup (once):
#   1. Repo → Settings → Actions → Runners → New self-hosted runner → Linux (or macOS) x64.
#   2. On the machine (must stay online near run times): follow the download + config.sh commands.
#   3. Start the runner: ./run.sh (or install as a service — see GitHub docs).
#
# Secrets: GOOGLE_SERVICE_ACCOUNT_JSON (required). HTTPS_PROXY (optional).
#
# Schedule:
#   • Hourly :25 UTC — fetch + content fingerprint check; upload when ETL output changed.
#   • Daily 06:25 UTC — same check (fail-safe if hourly runs were skipped).
#
# Fingerprint: committed `.themadad-fingerprint` (v2: maxId:rows:hash) is the source of truth.
# cancel-in-progress drops stale queued jobs so a backlog on a slow runner does not block fresh polls.

name: Run polls when themadad updates

on:
  schedule:
    - cron: '25 * * * *'
    - cron: '25 6 * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Always upload (skip fingerprint) — use to verify fetch + Sheets'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: themadad-poll-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: [self-hosted, linux]
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-polls.txt

      - name: Install dependencies
        run: pip install -r requirements-polls.txt

      - name: Detect new polls on themadad.com (or force)
        id: check
        env:
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_upload }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual force_upload — skipping fingerprint check."
            exit 0
          fi
          python check_themadad.py

      - name: Require GOOGLE_SERVICE_ACCOUNT_JSON
        if: steps.check.outputs.changed == 'true'
        env:
          CREDS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "::error::Add repository secret GOOGLE_SERVICE_ACCOUNT_JSON (service account JSON with Sheets edit access)."
            exit 1
          fi

      - name: Fetch, transform, upload to Sheets
        if: steps.check.outputs.changed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python run_polls.py

      - name: Commit sync fingerprint after successful upload
        if: success() && steps.check.outputs.changed == 'true'
        run: |
          if [ ! -f .themadad-fingerprint ]; then
            echo "::error::Missing .themadad-fingerprint after upload."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .themadad-fingerprint
          git diff --staged --quiet && echo "Fingerprint unchanged in git — skip commit." && exit 0
          git commit -m "chore: update themadad sync fingerprint [skip ci]"
          git push
