# Self-hosted runner: fetch themadad from YOUR network (avoids GitHub datacenter 403).
#
# Setup (once):
#   1. Repo → Settings → Actions → Runners → New self-hosted runner → Linux (or macOS) x64.
#   2. On the machine (must stay online near run times): follow the download + config.sh commands.
#   3. Start the runner: ./run.sh (or install as a service — see GitHub docs "Configuring the self-hosted runner application as a service").
#
# runs-on: [self-hosted, linux] matches the default OS label GitHub assigns (labels are case-insensitive).
# On macOS, change to [self-hosted, macOS]. Windows: use WSL2/Linux runner or custom label + bash.
#
# Secrets: GOOGLE_SERVICE_ACCOUNT_JSON (required). HTTPS_PROXY (optional).
#
# Schedule:
#   • Hourly :25 UTC — check themadad; upload only when max Poll ID changed (fingerprint).
#   • Daily 06:25 UTC (~09:25 Asia/Jerusalem in summer) — guaranteed catch-up check (no hour gate).
# Hourly runs use a widened Jerusalem-hour soft gate (07–23); daily + manual always run.
# concurrency does NOT cancel queued runs (self-hosted backlog was dropping allowed-hour jobs).

name: Run polls when themadad updates

on:
  schedule:
    - cron: '25 * * * *'
    - cron: '25 6 * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Always upload (skip fingerprint) — use to verify fetch + Sheets'
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: themadad-poll-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, linux]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Gate — daily / manual always run; hourly widened Jerusalem hours
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual run — gate open."
            exit 0
          fi

          # Daily catch-up cron — always check (fail-safe if hourly runs were gated or backlogged).
          if [ "$EVENT_SCHEDULE" = "25 6 * * *" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Daily catch-up (06:25 UTC) — gate open."
            exit 0
          fi

          # Hourly: use workflow run created_at (scheduled trigger time), NOT runner wall clock.
          CREATED=$(python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "poll-sync-gate",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.load(resp)
              print(data.get("created_at") or "")
          except (urllib.error.URLError, json.JSONDecodeError, KeyError) as ex:
              print(f"::warning::Could not read run created_at: {ex}", file=sys.stderr)
              print("")
          PY
          )

          if [ -z "$CREATED" ] || [ "$CREATED" = "null" ]; then
            echo "::warning::Could not read run created_at — running fetch (fail-open)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          H=$(TZ=Asia/Jerusalem date -d "$CREATED" +%H)
          echo "Scheduled run created_at=$CREATED → Asia/Jerusalem hour=$H"
          case "$H" in
            0[7-9]|1[0-9]|2[0-3])
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Within widened Jerusalem hours (07–23) — checking themadad."
              ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Outside widened Jerusalem hours (07–23) — skipping hourly check."
              ;;
          esac

      - uses: actions/cache/restore@v4
        if: steps.gate.outputs.skip != 'true'
        id: cache-restore
        with:
          path: .themadad-fingerprint
          key: themadad-fingerprint-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            themadad-fingerprint-

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-polls.txt

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements-polls.txt

      - name: Detect new polls on themadad.com (or force)
        id: check
        if: steps.gate.outputs.skip != 'true'
        env:
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_upload }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual force_upload — skipping fingerprint check."
            exit 0
          fi
          python check_themadad.py

      - name: Require GOOGLE_SERVICE_ACCOUNT_JSON
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        env:
          CREDS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "::error::Add repository secret GOOGLE_SERVICE_ACCOUNT_JSON (service account JSON with Sheets edit access)."
            exit 1
          fi

      - name: Fetch, transform, upload to Sheets
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python run_polls.py

      - name: Refresh fingerprint after successful upload
        id: write-fp
        if: success() && steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        env:
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          python -c "from run_polls import fetch_html, DATA_URL, max_poll_id_from_html; m=max_poll_id_from_html(fetch_html(DATA_URL)); assert m is not None; open('.themadad-fingerprint','w').write(str(m))"
          echo "fingerprint=$(cat .themadad-fingerprint)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/save@v4
        if: success() && steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        with:
          path: .themadad-fingerprint
          key: themadad-fingerprint-${{ steps.write-fp.outputs.fingerprint }}
