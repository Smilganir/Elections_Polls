# Twice daily (09:00 & 21:00 Asia/Jerusalem): check https://themadad.com/allpolls/ for a new
# max Poll ID (same parse/dedupe rules as run_polls.py). If it changed vs last run, run run_polls.py.
# Fingerprint is stored in GitHub Actions cache (not an inbound HTTP webhook).
#
# Fetch uses curl_cffi (Chrome TLS impersonation) in run_polls.fetch_html — plain requests often gets 403
# from themadad/WAF on GitHub-hosted runner IPs.
#
# Secrets: GOOGLE_SERVICE_ACCOUNT_JSON — service account JSON with Sheets edit access; share the sheet.

name: Run polls when themadad updates

on:
  schedule:
    # Hourly :25 UTC — time gate below keeps only two runs/day at ~9:25 and ~21:25 Jerusalem
    - cron: '25 * * * *'
  workflow_dispatch:
    inputs:
      force_upload:
        description: 'Upload to Sheets even if fingerprint unchanged'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate — 09:00 or 21:00 Asia/Jerusalem (scheduled), or any manual run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          H=$(TZ=Asia/Jerusalem date +%H)
          echo "Asia/Jerusalem hour=$H"
          if [ "$H" = "09" ] || [ "$H" = "21" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/cache/restore@v4
        if: steps.gate.outputs.skip != 'true'
        id: cache-restore
        with:
          path: .themadad-fingerprint
          key: themadad-fingerprint-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            themadad-fingerprint-

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-polls.txt

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pip install -r requirements-polls.txt

      - name: Detect new polls on themadad.com (or force)
        id: check
        if: steps.gate.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_upload }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual force_upload — skipping fingerprint check."
            exit 0
          fi
          python check_themadad.py

      - name: Require GOOGLE_SERVICE_ACCOUNT_JSON
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        env:
          CREDS: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "::error::Add repository secret GOOGLE_SERVICE_ACCOUNT_JSON (service account JSON with Sheets edit access)."
            exit 1
          fi

      - name: Fetch, transform, upload to Sheets
        if: steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python run_polls.py

      - name: Refresh fingerprint after successful upload
        id: write-fp
        if: success() && steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        run: |
          python -c "from run_polls import fetch_html, DATA_URL, max_poll_id_from_html; m=max_poll_id_from_html(fetch_html(DATA_URL)); assert m is not None; open('.themadad-fingerprint','w').write(str(m))"
          echo "fingerprint=$(cat .themadad-fingerprint)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/save@v4
        if: success() && steps.gate.outputs.skip != 'true' && steps.check.outputs.changed == 'true'
        with:
          path: .themadad-fingerprint
          key: themadad-fingerprint-${{ steps.write-fp.outputs.fingerprint }}
